async function api(path, body){
  const res = await fetch("/api/"+path, {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify(Object.assign({initData: TG ? TG.initData : ""}, body||{}))});
  const d = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(d.error || ("HTTP "+res.status));
  return d;
}

  if(_busy) return;
  _busy = true;
  api(path, body).then(d=>{ _busy=false; applyBoot(d); if(after) after(); }).catch(e=>{ _busy=false; toast("⚠️ "+e.message); });
}

function escJs(s){ return String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,"&quot;"); }
/* ARIA + клавиатура для псевдо-чекбоксов (.check-row): роль, состояние, Enter/Пробел = клик */
function escHtml(s){ return String(s == null ? "" : s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
function escAttr(s){ return escHtml(s); }
function cleanIncoming(v){
  if(typeof v === "string") return v.replace(/[<>"']/g, "");
  if(Array.isArray(v)) return v.map(cleanIncoming);
  if(v && typeof v === "object"){ Object.keys(v).forEach(k=>{ v[k]=cleanIncoming(v[k]); }); }
  return v;
}

/* SRV: пересобрать каталог из базы + добавленных позиций и блокировок категорий (идемпотентно, на каждый boot) */
function rebuildCatalog(extraItems, catBlocks, removedItems){
  const base = JSON.parse(JSON.stringify(CATALOG_BASE));
  const removed = new Set(removedItems||[]);
  (extraItems||[]).forEach(it=>{
    let cat = base.find(c=>c.cat===it.cat);
    if(!cat){ cat={cat:it.cat, items:[]}; base.push(cat); }
    if(!cat.items.some(x=>x.short===it.short))
      cat.items.push({short:it.short, full:it.full||it.short, total:it.total||1, level:it.level||null});
  });
  const blocks = catBlocks||{};
  base.forEach(c=>{
    c.items = c.items.filter(it=>!removed.has(it.short));   // скрытые старшим — вон из каталога
    if(blocks[c.cat]) c.blocked=blocks[c.cat]; else delete c.blocked;
  });
  CATALOG = base.filter(c=>c.items.length || c.blocked);
}
function catOf(short){ for(const c of CATALOG) if(c.items.some(i=>i.short===short)) return c.cat; return null; }

/* Escape закрывает шторку/модалку (обе живут в #overlay), Tab внутри неё не убегает наружу */
document.addEventListener("keydown", e=>{
  const ov = $("overlay");
  if(!ov || !ov.firstElementChild) return;
  if(e.key==="Escape"){ ov.innerHTML=""; render(); return; }
  if(e.key==="Tab"){
    const f = ov.querySelectorAll('button,[href],input,select,textarea,[tabindex]:not([tabindex="-1"])');
    if(!f.length) return;
    const first = f[0], last = f[f.length-1];
    if(e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
    else if(!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
  }
});

const SCREENS = {};
let _scrKey = "";
function render(){
  const s = cur();
  const out = SCREENS[s.name](s.params);
  const isNested = stack.length>1 || (s.name==="wizard" && wiz && wiz.step>1);
  $("tgleft").textContent = isNested ? "‹ Назад" : "Закрыть";
  if(IN_TG){ if(isNested) TG.BackButton.show(); else TG.BackButton.hide(); }
  /* тот же экран/шаг — сохраняем позицию скролла (выбор даты/слотов/чекбоксы не прыгают) */
  const scr = $("screen");
  const key = s.name+"|"+stack.length+"|"+(s.name==="wizard"&&wiz?wiz.step:"");
  const same = key===_scrKey;
  const keep = same ? scr.scrollTop : 0;
  /* введённый текст переживает перерисовку (чат, комментарии, поиск) */
  const inputs = {};
  if(same) scr.querySelectorAll("input[id],textarea[id]").forEach(el=>{
    inputs[el.id] = {v:el.value, f:document.activeElement===el, s:el.selectionStart};
  });
  scr.innerHTML = '<div class="screen-inner'+(same?" nofade":"")+'">'+out.body+'</div>' + (out.mainbtn||"");
  for(const id in inputs){
    const el = $(id);
    if(el && !el.value){ el.value = inputs[id].v;
      if(inputs[id].f){ el.focus(); try{ el.setSelectionRange(inputs[id].s, inputs[id].s); }catch(e){} } }
  }
  scr.scrollTop = keep;
  _scrKey = key;
  if(out.after) out.after();
}

function calHtml(cfg){
  // cfg: {month:{y,m}, sel1, sel2, single, pickFn, navFn, busyDots, monthsList, minIso}
  const y = cfg.month.y, m = cfg.month.m;
  const first = new Date(y,m,1);
  let wd = first.getDay(); wd = wd===0?6:wd-1; // пн=0
  const dim = new Date(y,m+1,0).getDate();
  const minIso = cfg.minIso!==undefined ? cfg.minIso : (SRV ? isoPlus(2) : "2026-07-04"); // сегодня + 2 дня (по умолч.)
  const monthsList = cfg.monthsList || MONTHS;
  let cells = [];
  for(let i=0;i<wd;i++) cells.push("<span></span>");
  for(let d=1;d<=dim;d++){
    const iso = y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    const off = iso < minIso;
    const sel = cfg.sel1===iso || cfg.sel2===iso;
    const inR = cfg.sel1 && cfg.sel2 && iso>cfg.sel1 && iso<cfg.sel2;
    const n = loadOf(iso);
    const dotColor = cfg.busyDots===false ? null : (n>=7?"var(--destructive)":n>=5?"var(--accent)":n>=2?"var(--warn)":"var(--ok)");
    const loadLbl = (!dotColor||off) ? "" : (n>=7?"высокая загруженность":n>=5?"повышенная загруженность":n>=2?"средняя загруженность":"низкая загруженность");
    cells.push('<button class="day '+(sel?"sel":"")+(inR?" inrange":"")+'" '+(off?"disabled":"")+(loadLbl?' title="'+loadLbl+'"':"")+
      ' onclick="'+cfg.pickFn+'(\''+iso+'\')">'+d+
      (dotColor&&!off?'<span class="load" style="background:'+dotColor+'"></span>':"")+'</button>');
  }
  const mi = monthsList.findIndex(x=>x.y===y && x.m===m);
  return `<div class="cal">
    <div class="cal-head">
      <button class="cal-nav" aria-label="Предыдущий месяц" ${mi<=0?"disabled":""} onclick="${cfg.navFn}(-1)">‹</button>
      <b>${MONTH_NAMES[m]} ${y}</b>
      <button class="cal-nav" aria-label="Следующий месяц" ${mi>=monthsList.length-1?"disabled":""} onclick="${cfg.navFn}(1)">›</button>
    </div>
    <div class="cal-grid">
      ${["пн","вт","ср","чт","пт","сб","вс"].map(w=>'<span class="wd">'+w+'</span>').join("")}
      ${cells.join("")}
    </div>
    ${cfg.busyDots===false?"":`<div class="legend">
      <span><span class="dot" style="background:var(--ok)"></span>0–1</span>
      <span><span class="dot" style="background:var(--warn)"></span>2–4</span>
      <span><span class="dot" style="background:var(--accent)"></span>5–6</span>
      <span><span class="dot" style="background:var(--destructive)"></span>7+</span>
    </div>`}
  </div>`;
}

      <div class="sec-label">Опции</div>

/* ---- реальные фото сдачи: файл с телефона -> сжатие до 1280px -> base64 на сервер ---- */
let retPhotos = [], hoPhotos = [], appealPhotos = [], bcPhotos = [];
function photoArr(kind){ return kind==="ret" ? retPhotos : kind==="ho" ? hoPhotos : kind==="appeal" ? appealPhotos : bcPhotos; }
const PHOTO_MAX = 5;
/* Галерея фото: миниатюры собранных снимков (с ✕) + плитка «добавить» (multiple — можно выбрать сразу несколько). */
function photosGrid(kind){
  const arr = photoArr(kind);
  const tiles = arr.map((p,i)=>`<div class="ph done" style="position:relative;background:url(${p}) center/cover;border-style:solid">
    <button onclick="rmPhoto('${kind}',${i})" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;line-height:1;cursor:pointer">✕</button>
  </div>`).join("");
  const addTile = arr.length<PHOTO_MAX ? `<div class="ph" onclick="$('ph-add-${kind}').click()"><i>📷</i>добавить
    <input type="file" id="ph-add-${kind}" accept="image/*" multiple style="display:none" onchange="addPhotos(this,'${kind}')"></div>` : "";
  return '<div class="photos">'+tiles+addTile+'</div>';
}
function shrinkPhoto(file){
  return new Promise(res=>{
    const img = new Image();
    img.onload = ()=>{
      const k = Math.min(1, 1024/Math.max(img.width,img.height));
      const cv = document.createElement("canvas");
      cv.width = Math.max(1,Math.round(img.width*k)); cv.height = Math.max(1,Math.round(img.height*k));
      cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
      URL.revokeObjectURL(img.src);
      res(cv.toDataURL("image/jpeg",.65));
    };
    img.onerror = ()=>res(null);
    img.src = URL.createObjectURL(file);
  });
}
async function addPhotos(inp, kind){
  const files = Array.from(inp.files||[]);
  inp.value = "";
  if(!files.length) return;
  const arr = photoArr(kind);
  let bad = 0;
  for(const f of files){
    if(arr.length>=PHOTO_MAX){ toast("Максимум "+PHOTO_MAX+" фото"); break; }
    const url = await shrinkPhoto(f);
    if(url) arr.push(url); else bad++;
  }
  if(bad) toast("Часть фото не прочиталась ("+bad+")");
  const bytes = arr.reduce((a,p)=>a+p.length,0);
  if(bytes > 20*1024*1024){ arr.pop(); toast("Фото слишком тяжёлые — уберите одно и попробуйте снова"); }
  redrawPhotoHost(kind);
}
function rmPhoto(kind, i){ photoArr(kind).splice(i,1); redrawPhotoHost(kind); }
/* галерея ret/ho живёт на экране (render), appeal/bc — в шите (перерисовать шит) */
function redrawPhotoHost(kind){
  if(kind==="appeal") openQuestion();
  else if(kind==="bc") openBroadcast();
  else render();
}

function mondayIso(offset){
  const d=new Date(); d.setHours(12,0,0,0); d.setDate(d.getDate()-((d.getDay()+6)%7)+(offset||0)*7);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function isoShift(iso,n){ const d=new Date(iso+"T12:00:00");d.setDate(d.getDate()+n);return d.toISOString().slice(0,10); }
function adminTasks(){
  const out=[];
  requests.forEach(r=>{
    if(["closed","rejected","canceled"].includes(r.status)) return;
    let action="", day=r.d1Iso;
    if(!r.curator){ action="Взять в кураторство"; }
    else if(r.status==="curator"){ action="Согласовать"; }
    else if(r.status==="approved"){ action="Выдать"; }
    else if(["issued","ret"].includes(r.status)){ action="Принять возврат"; day=r.d2Iso; }
    if(action&&day) out.push({day,action,title:"Заявка ID "+r.id+" · "+r.event,mine:!!r.curMe,click:"navTo('adminReq',{id:"+r.id+"})",kind:"req"});
  });
  bookings626.forEach(b=>{
    if(["closed","rejected","canceled"].includes(b.status)) return;
    let action="";
    if(b.status==="new") action="Согласовать 626";
    else if(!b.curator) action="Взять в кураторство";
    else action="Принять 626";
    out.push({day:b.when,action,title:"626 №"+b.id+" · "+b.goal,mine:!!b.curMe,click:"navTo('studioDetail',{id:"+b.id+"})",kind:"626"});
  });
  return out;
}

/* Теоретические номера экземпляров: система предлагает минимальный свободный,
   админ может тапом сменить на другой свободный. Пользователь номера не видит. */
let issueFreeNums = {};
function freeNumsOf(short){
  if(SRV) return issueFreeNums[short]||[];
  const it=itemOf(short), total=it?it.total:1, busyCount=lockOf(short)%total;
  const free=[];for(let n=busyCount+1;n<=total;n++)free.push(n);return free.length?free:[1];
}
function initIssue(r,isReturn){
  issueCheck={id:r.id,isReturn:!!isReturn,done:{},nums:{},items:r.items.map(i=>[i[0],i[1]]),changed:false};
  issueCheck.items.forEach(i=>{issueCheck.done[i[0]]=true;const saved=r.nums&&r.nums[i[0]];const f=isReturn?(Array.isArray(saved)?saved:(saved?[saved]:[])):freeNumsOf(i[0]);issueCheck.nums[i[0]]=f.slice(0,i[1]);});
  drawIssue(r);
}
function openIssue(id,isReturn){
  const r=requests.find(x=>x.id===id);
  if(SRV&&!isReturn){if(_busy)return;_busy=true;api("availability",{d1:r.d1Iso,d2:r.d2Iso,exclude:r.id,items:r.items}).then(d=>{_busy=false;issueFreeNums=d.freeNums||{};initIssue(r,false)}).catch(e=>{_busy=false;toast("Ошибка: "+e.message)});return;}
  initIssue(r,isReturn);
}
function cycleNum(short,rid){
  const f=freeNumsOf(short), item=issueCheck.items.find(i=>i[0]===short), qty=item?item[1]:1;
  if(!f.length)return;const cur=issueCheck.nums[short]||[], at=Math.max(0,f.indexOf(cur[0]));
  issueCheck.nums[short]=Array.from({length:qty},(_,i)=>f[(at+1+i)%f.length]);
  drawIssue(requests.find(x=>x.id===rid));
}

/* нет позиции в наличии — админ убирает её из выдачи или добавляет замену */
function issueDrop(short, rid){
  issueCheck.items = issueCheck.items.filter(i=>i[0]!==short);
  delete issueCheck.done[short]; delete issueCheck.nums[short];
  issueCheck.changed = true;
  drawIssue(requests.find(x=>x.id===rid));
}
function issueAdd(short, rid){
  const ex = issueCheck.items.find(i=>i[0]===short);
  if(ex){ ex[1]++; const f=freeNumsOf(short); issueCheck.nums[short]=f.slice(0,ex[1]); } else {
    issueCheck.items.push([short,1]);
    const f = freeNumsOf(short); if(f.length) issueCheck.nums[short]=f.slice(0,1);
  }
  issueCheck.changed = true;
  drawIssue(requests.find(x=>x.id===rid));
}

function drawIssue(r){
  /* сохраняем скролл шита и введённый комментарий — чтобы тап по чекбоксу не прыгал наверх и не стирал текст */
  const _sh = document.querySelector(".sheet"); const _top = _sh ? _sh.scrollTop : 0;
  const _ci = $("issue-comm"); const _comm = _ci ? _ci.value : "";
  const all = issueCheck.items.length>0 && issueCheck.items.every(i=>issueCheck.done[i[0]]);
  $("overlay").innerHTML = `
    <div class="sheet-veil" onclick="closeSheet()"></div>

      <h3>${issueCheck.isReturn?"🔁 Приём возврата":"🟢 Выдача"} · ID ${r.id}</h3>
      <p class="sub" style="margin-bottom:10px">Отметьте каждую позицию. № экземпляра предложен автоматически — тап по номеру, чтобы сменить.${issueCheck.isReturn?"":" Нет в наличии — уберите позицию крестиком."}</p>
      ${issueCheck.items.map(i=>{ const es=escJs(i[0]); return `
        <div class="check-row ${issueCheck.done[i[0]]?"on":""}" ${chkA(issueCheck.done[i[0]])} onclick="issueCheck.done['${es}']=!issueCheck.done['${es}'];drawIssue(requests.find(x=>x.id===${r.id}))">
          <span class="checkbox">✓</span><span class="grow">${i[0]}${i[1]>1?" × "+i[1]:""}</span>
          ${issueCheck.nums[i[0]]&&issueCheck.nums[i[0]].length?'<button class="btn-sm" style="font-family:var(--mono)" onclick="event.stopPropagation();cycleNum(\''+es+'\','+r.id+')">№ '+issueCheck.nums[i[0]].join(', ')+'</button>':""}
          ${issueCheck.isReturn?'<span class="hud">'+(issueCheck.done[i[0]]?"OK":"—")+'</span>'
            :'<button class="btn-sm danger" onclick="event.stopPropagation();issueDrop(\''+es+'\','+r.id+')">✕</button>'}
        </div>`; }).join("")||'<p class="sub" style="padding:8px 0">Все позиции убраны — добавьте хотя бы одну или отклоните заявку.</p>'}
      ${issueCheck.isReturn?"":'<button class="btn-sm" style="width:100%;margin-top:8px" onclick="issueAddSheet('+r.id+')">➕ Добавить позицию</button>'}
      ${issueCheck.changed?'<p class="sub" style="margin-top:8px">Состав изменён — пользователь получит обновлённый список при выдаче.</p>':""}
      <div class="sec-label">Комментарий ${issueCheck.isReturn?"(заполнен → заявка уйдёт старшим)":"(увидит пользователь)"}</div>
      <input type="text" id="issue-comm" maxlength="300" placeholder="Необязательно">
      <button class="mainbtn" style="margin-top:14px" ${all?"":"disabled"} onclick="doIssue()">${issueCheck.isReturn?"Принять возврат":"Выдать"}</button>
    </div>`;
  const sh2 = document.querySelector(".sheet"); if(sh2) sh2.scrollTop = _top;
  const ci2 = $("issue-comm"); if(ci2 && _comm) ci2.value = _comm;
}
function doIssue(){
  const r = requests.find(x=>x.id===issueCheck.id);
  const comm = $("issue-comm").value.trim();
  if(SRV){
    const isRet = issueCheck.isReturn;
    srvDo("request/action",{id:issueCheck.id, action:isRet?"return":"issue", comment:comm,
      items:(!isRet && issueCheck.changed) ? issueCheck.items : undefined, nums:!isRet?issueCheck.nums:undefined},
      ()=>{ $("overlay").innerHTML=""; render();
        toast(isRet ? (comm ? "📷 Есть комментарий — возврат ушёл старшим" : "✅ Возврат принят, заявка закрыта")
                    : "🟢 Выдано. Пользователю ушёл список."); });
    return;
  }
  const tm = "02.07, "+new Date().toTimeString().slice(0,5);
  if(issueCheck.isReturn){
    if(comm){ r.status="ret"; r.history.push(["ret",tm+" · к старшим: "+comm]); toast("📷 Есть комментарий — возврат ушёл на проверку старшим"); }
    else { r.status="closed"; r.returnedAt=r.returnedAt||tm; r.history.push(["closed",tm]); toast("✅ Возврат принят, заявка в архиве. Пользователю: «Заявка закрыта»"); }
  } else {
    if(issueCheck.changed) r.items = issueCheck.items.map(i=>[i[0],i[1]]);
    r.status="issued"; r.takenAt=tm; r.history.push(["issued",tm]);
    toast("🟢 Выдано. Пользователю ушёл список выданного оборудования.");
  }
  $("overlay").innerHTML=""; render();
}

      ${(SRV&&SRV.removedItems&&SRV.removedItems.length)?'<div class="sec-label">Скрытые (можно вернуть)</div><div>'+SRV.removedItems.map(s=>'<div class="list-item"><span class="grow" style="font-size:14px">'+s+'</span><button class="btn-sm ok" onclick="equipRestore(\''+escJs(s)+'\')">Вернуть</button></div>').join("")+'</div>':""}`,
    mainbtn: mainBtn("Добавить позицию","saveEquip()","", !ready)
  };
};
function saveEquip(){
  const cat = equipForm.cat==='__new' ? equipForm.newCat.trim() : equipForm.cat;
  const short = equipForm.short.trim();
  if(!cat || !short){ toast("Категория и название обязательны"); return; }
  const total = Math.max(1, parseInt(equipForm.total)||1);
  if(SRV){
    if(_busy) return; _busy=true;
    api("equip/add",{cat, short, full:equipForm.full.trim(), total, level:equipForm.level})
      .then(d=>{ _busy=false; applyBoot(d); equipForm=null; goBack(); toast("Позиция добавлена"); })
      .catch(e=>{ _busy=false; toast("⚠️ "+e.message); });
    return;
  }
  let c = CATALOG.find(x=>x.cat===cat); if(!c){ c={cat, items:[]}; CATALOG.push(c); }
  c.items.push({short, full:equipForm.full.trim()||short, total, level:equipForm.level||null});
  equipForm=null; goBack(); toast("Позиция добавлена (демо)");
}
function delEquip(short){
  if(SRV){ srvDo("equip/del",{short}, ()=>{ render(); toast("Позиция удалена"); }); return; }
  toast("Демо: удалилось бы на сервере");
}
function equipRemove(short){
  if(SRV){ srvDo("equip/remove",{short}, ()=>{ render(); toast("Позиция скрыта из каталога"); }); return; }
  toast("Демо: скрылось бы на сервере");
}
function equipRestore(short){
  if(SRV){ srvDo("equip/restore",{short}, ()=>{ render(); toast("Позиция возвращена"); }); return; }
  toast("Демо: вернулось бы на сервере");
}
let removeQ = "", removeCat = "Все";
function startRemoveEquip(){ removeQ=""; removeCat="Все"; navTo("removeEquip"); }
SCREENS.removeEquip = () => {
  const q = removeQ.trim().toLowerCase();
  const cats = ["Все", ...CATALOG.map(c=>c.cat)];
  const list = [];
  CATALOG.forEach(c=>{
    if(removeCat!=="Все" && c.cat!==removeCat) return;
    c.items.forEach(it=>{ if(!q || it.short.toLowerCase().includes(q)) list.push({short:it.short, cat:c.cat}); });
  });
  const removed = (SRV&&SRV.removedItems)||[];
  return {
    body:`
      <h1 class="big">Убрать оборудование</h1>
      <p class="sub" style="margin:6px 0 10px">Скрытая позиция пропадает из каталога у всех. Можно вернуть.</p>
      <div class="chips">${cats.map(c=>'<button class="chip-btn '+(removeCat===c?"on":"")+'" onclick="removeCat=\''+escJs(c)+'\';render()">'+(c==="Все"?"Все":icon(c,14)+c)+'</button>').join("")}</div>
      <div class="search"><input type="text" maxlength="60" placeholder="Поиск позиции" value="${removeQ}" oninput="removeQ=this.value;renderKeepFocus()"></div>
      <div>${list.slice(0,80).map(it=>'<div class="list-item"><div class="grow"><div style="font-size:14px">'+it.short+'</div><div class="hud">'+it.cat+'</div></div><button class="btn-sm danger" onclick="equipRemove(\''+escJs(it.short)+'\')">Скрыть</button></div>').join("")||'<div class="card sub">Ничего не нашлось</div>'}
        ${list.length>80?'<p class="sub" style="padding:8px">Показаны первые 80 — уточните поиск.</p>':""}</div>
      ${removed.length?'<div class="sec-label">Скрытые (можно вернуть)</div><div>'+removed.map(s=>'<div class="list-item"><span class="grow" style="font-size:14px">'+s+'</span><button class="btn-sm ok" onclick="equipRestore(\''+escJs(s)+'\')">Вернуть</button></div>').join("")+'</div>':""}`
  };
};
SCREENS.adminUsers = () => ({
  body:`
    ${verifQueue.length?`
    <div class="sec-label">⏳ Очередь верификации</div>
    ${verifQueue.map(v=>`
      <div class="card" style="border:1px solid color-mix(in srgb,var(--warn) 45%,transparent)">
        <div class="row"><div class="avatar" style="width:38px;height:38px;font-size:14px">${v.name[0]}</div>
        <div class="grow"><b style="font-size:14px">${v.name}</b><div class="hud">${v.org} · ${v.tg}${v.role?" · просит: "+v.role:""}</div></div></div>
        <div class="hud" style="margin:10px 0 5px">РОЛЬ ПРИ ВЕРИФИКАЦИИ (СТАВИТ АДМИН)</div>
        <div class="row" style="gap:6px">
          ${["активист","стажёр","СО/ССФ","production"].map(rl=>'<button class="chip-btn '+((v.assignRole||v.role||"активист")===rl?"on":"")+'" onclick="verifQueue.find(x=>x.id==='+v.id+').assignRole=\''+rl+'\';render()">'+rl+'</button>').join("")}
        </div>
        <div class="btnrow" style="margin-top:11px">
          <button class="btn-sm ok grow" onclick="verify(${v.id},'ok')">Верифицировать</button>
          <button class="btn-sm grow" onclick="rejectModal(${v.id})">Отклонить</button>
          <button class="btn-sm danger" onclick="banModal(${v.id})">Блок</button>
        </div>
      </div>`).join("")}`:""}
    <div class="sec-label">Все пользователи</div>
    <div class="search"><input type="text" maxlength="60" placeholder="Поиск по ФИО или организации" value="${userQ}" oninput="userQ=this.value;renderKeepFocus()"></div>
    <div>${usersDb.filter(u=>!userQ||u.name.toLowerCase().includes(userQ.toLowerCase())||u.org.toLowerCase().includes(userQ.toLowerCase())).map(u=>`
      <div class="list-item" onclick="openUserCard(${usersDb.indexOf(u)})">
        <div class="avatar" style="width:34px;height:34px;font-size:12px">${u.name.split(" ").map(w=>w[0]).slice(0,2).join("")}</div>
        <div class="grow"><div style="font-size:14px;font-weight:500">${u.name}</div>
        <div class="hud">${u.org} · ${u.dep} · ${u.role}</div></div>
        <span class="hud">${u.ok?"✓":"⏳"}</span>
      </div>`).join("")}</div>`
});
function openUserCard(i){
  const u = usersDb[i];
  if(!u) return;
  const roles = ["активист","стажёр","СО/ССФ","production"];
  $("overlay").innerHTML = `
    <div class="sheet-veil" onclick="closeSheet()"></div>
    <div class="sheet"><div class="grab"></div>
      <div class="row" style="margin-bottom:10px">
        <div class="avatar" style="width:40px;height:40px;font-size:14px">${(u.name||"?").split(" ").map(w=>w[0]).slice(0,2).join("")}</div>
        <div class="grow"><b style="font-size:15px">${u.name||u.tg||"?"}</b><div class="hud">${u.org||""} · ${u.dep||"—"} · ${u.tg||""}</div></div>
        <span class="hud">${u.ok?"✓":"⏳"}</span>
      </div>
      <div class="sec-label">Роль</div>
      <div class="row" style="gap:6px;flex-wrap:wrap">
        ${roles.map(rl=>'<button class="chip-btn '+(u.role===rl?"on":"")+'" onclick="setUserRole('+i+',\''+rl+'\')">'+rl+'</button>').join("")}
      </div>
      <div class="btnrow" style="margin-top:16px">
        ${u.verified==="blocked"
          ? '<button class="btn-sm ok grow" style="padding:12px" onclick="unblockUser('+(SRV?u.id:("\'"+escJs(u.tg||"")+"\'"))+')">Разблокировать</button>'
          : '<button class="btn-sm danger grow" style="padding:12px" onclick="banModal('+(SRV?u.id:0)+')">Заблокировать</button>'}
        <button class="btn-sm danger grow" style="padding:12px" onclick="delUser(${i})">Удалить</button>
      </div>
      <p class="sub" style="margin-top:8px">Роль, блокировка и удаление — действия старшего админа.</p>
    </div>`;
}
function setUserRole(i, rl){
  const u = usersDb[i]; if(!u) return;
  if(SRV){ srvDo("user/role",{userId:u.id, role:rl}, ()=>{ closeSheet(); toast("Роль обновлена: "+rl); }); return; }
  u.role = rl; closeSheet(); toast("Роль обновлена: "+rl);
}
function delUser(i){
  const u = usersDb[i]; if(!u) return;
  confirmModal("Удалить пользователя?","«"+(u.name||u.tg)+"» будет удалён. Заявки останутся в истории.",()=>{
    if(SRV){ srvDo("user/delete",{userId:u.id}, ()=>{ $("overlay").innerHTML=""; render(); toast("Пользователь удалён"); }); return; }
    usersDb.splice(i,1); $("overlay").innerHTML=""; render(); toast("Пользователь удалён");
  });
}
function verify(id, act, reason){
  const v = verifQueue.find(x=>x.id===id);
  const rl = (v&&(v.assignRole||v.role))||"активист";
  if(SRV){ srvDo("verify",{userId:id, action:act, role:rl, reason:reason||""}, ()=>{ render();
    toast(act==="ok" ? "✅ Верифицирован с ролью «"+rl+"» — пользователю ушло уведомление"
                     : "Отклонено — пользователь может подать заново."); }); return; }
  verifQueue = verifQueue.filter(x=>x.id!==id);
  if(act==="ok"){
    const u = usersDb.find(x=>x.tg==="@dkovalev");
    if(u){ u.ok = true; u.role = rl; }
    toast("✅ Верифицирован с ролью «"+rl+"» — доступ открыт, пользователю ушло уведомление");
  }
  else toast("Отклонено — пользователь может исправить данные и подать заново.");
  render();
}
function rejectModal(id){
  $("overlay").innerHTML = `
    <div class="modal-veil" onclick="if(event.target===this)this.remove()">
      <div class="modal">
        <h3>Отклонить верификацию</h3>
        <p>Пользователь увидит причину и сможет подать заявку заново.</p>
        <div class="sec-label" style="margin-top:0">Причина отказа</div>
        <input type="text" id="rej-reason" maxlength="200" placeholder="Например: нет в списке участников">
        <div class="acts">
          <button class="btn-sm" onclick="$('overlay').innerHTML=''">Отмена</button>
          <button class="btn-sm danger" onclick="const rr=$('rej-reason')?$('rej-reason').value.trim():'';$('overlay').innerHTML='';verify(${id},'no',rr)">Отклонить</button>
        </div>
      </div>
    </div>`;
}
let banBlk = null;
function banModal(id){
  banBlk = {id, reason:"", term:"", day:null, month:MONTHS[0]};
  drawBanModal();
}
function banReasonInput(el){ banBlk.reason = el.value; }
function banTermPick(term){
  banBlk.term = term;
  if(term==="навсегда"){ banBlk.day = null; }
  else {
    const iso = isoPlus({"день":1,"неделя":7,"месяц":30}[term] || 1);
    banBlk.day = iso;
    banBlk.month = {y:+iso.slice(0,4), m:+iso.slice(5,7)-1};
  }
  drawBanModal();
}
function banBlkPick(iso){ banBlk.day = iso; drawBanModal(); }
function banBlkNav(d){ const i=MONTHS.findIndex(x=>x.y===banBlk.month.y&&x.m===banBlk.month.m); if(MONTHS[i+d]){ banBlk.month=MONTHS[i+d]; drawBanModal(); } }
function drawBanModal(){
  const forever = banBlk.term==="навсегда";
  const ready = forever || !!banBlk.day;
  $("overlay").innerHTML = `
    <div class="modal-veil" onclick="if(event.target===this)this.remove()">
      <div class="modal" style="max-height:85vh;overflow-y:auto">
        <h3>🚫 Заблокировать</h3>
        <p>Пользователь попадёт в чёрный список и увидит контакт для связи.</p>
        <div class="sec-label" style="margin-top:0">Причина</div>
        <input type="text" id="ban-reason" maxlength="200" placeholder="Например: фейковый аккаунт" value="${banBlk.reason}" oninput="banReasonInput(this)">
        <div class="sec-label">Срок</div>
        <div class="slots" style="grid-template-columns:repeat(4,1fr)">
          <button class="slot ${banBlk.term==='день'?'sel':''}" onclick="banTermPick('день')">1 день</button>
          <button class="slot ${banBlk.term==='неделя'?'sel':''}" onclick="banTermPick('неделя')">неделя</button>
          <button class="slot ${banBlk.term==='месяц'?'sel':''}" onclick="banTermPick('месяц')">месяц</button>
          <button class="slot ${banBlk.term==='навсегда'?'sel':''}" onclick="banTermPick('навсегда')">навсегда</button>
        </div>
        ${(banBlk.term && !forever) ? calHtml({month:banBlk.month, sel1:banBlk.day, sel2:null, pickFn:"banBlkPick", navFn:"banBlkNav", busyDots:false, minIso:isoPlus(1)}) : ""}
        <div class="acts">
          <button class="btn-sm" onclick="$('overlay').innerHTML=''">Отмена</button>
          <button class="btn-sm danger" ${ready?"":"disabled"} onclick="doBan(${banBlk.id})">Заблокировать</button>
        </div>
      </div>
    </div>`;
}
function doBan(id){
  const reason = banBlk.reason.trim();
  const term = banBlk.term;
  let days = 0;
  if(term && term!=="навсегда" && banBlk.day){
    days = Math.max(1, Math.round((new Date(banBlk.day) - new Date(isoPlus(0))) / 86400000));
  }
  if(SRV){ srvDo("verify",{userId:id, action:"block", reason, term, days},
    ()=>{ $("overlay").innerHTML=""; render(); toast("🚫 Пользователь заблокирован"); }); return; }
  verifQueue = verifQueue.filter(v=>v.id!==id);
  $("overlay").innerHTML=""; render(); toast("🚫 Пользователь заблокирован");
}
let _confirmFn = null;
function confirmModal(title, text, fn){
  _confirmFn = fn;
  $("overlay").innerHTML = `
    <div class="modal-veil" onclick="if(event.target===this)this.remove()">
      <div class="modal"><h3>${title}</h3><p>${text}</p>
        <div class="acts">
          <button class="btn-sm" onclick="$('overlay').innerHTML=''">Отмена</button>
          <button class="btn-sm danger" onclick="$('overlay').innerHTML='';_confirmFn()">Да</button>
        </div></div></div>`;
}

/* ================= TELEGRAM INIT ================= */
function applyTgTheme(){
  const sv = savedTheme();
  const dark = sv ? sv==="dark" : TG.colorScheme === "dark";
  $("phone").classList.toggle("dark", dark);
  const tb = $("themebtn"); if(tb) tb.textContent = dark ? "☀️ Тема" : "🌙 Тема";
  try{
    TG.setHeaderColor(dark ? "#000000" : "#ffffff");
    TG.setBackgroundColor(dark ? "#000000" : "#ffffff");
  }catch(e){}
}
async function bootApp(){
  try{
    const d = await api("me");
    applyBoot(d);
    initCalSRV();
    if(d.verified==="blocked") resetTo("blocked");
    else if(d.registered && d.verified==="ok") resetTo("home");
    else if(d.registered && d.verified==="pending") resetTo("regWait");
    else if(d.registered && d.verified==="rejected") resetTo("rejected");
    else resetTo("rules");
    startRealtime();
  }catch(e){
    SRV = null;
    let agreed = false; try{ agreed = !!localStorage.getItem("obor_agreed"); }catch(_e){}
    resetTo(agreed ? "home" : "rules");
    toast("Демо-режим: бэкенд недоступен");
  }
}
/* SSE сообщает только о смене данных; /api/me остаётся единственным источником состояния.
   Если SSE недоступен, продолжает работать резервный polling раз в 12 секунд. */
let _pollT=null,_lastSig="",_events=null,_sseOpen=false,_refreshing=false,_refreshPending=false,_deferT=null;
function liveBlocked(){const ae=document.activeElement;return !!$("overlay").innerHTML||!!(ae&&(ae.tagName==="INPUT"||ae.tagName==="TEXTAREA"));}
async function refreshLive(){
  if(!SRV||_refreshing)return;
  if(liveBlocked()){_refreshPending=true;clearTimeout(_deferT);_deferT=setTimeout(refreshLive,1000);return;}
  _refreshing=true;_refreshPending=false;
  try{const d=await api("me");const sig=liveSig(d);
    if(sig===_lastSig){SRV=d;return;}_lastSig=sig;applyBoot(d);render();}catch(e){}finally{_refreshing=false;}
}
function startPolling(){if(_pollT)return;_pollT=setInterval(()=>{if(!_sseOpen||_refreshPending)refreshLive();},12000);}
function stopPolling(){if(_pollT){clearInterval(_pollT);_pollT=null;}}
function startRealtime(){
  startPolling();
  if(!window.EventSource)return;
  if(_events)_events.close();
  _events=new EventSource("/api/events?initData="+encodeURIComponent(TG?TG.initData:""));
  _events.addEventListener("ready",()=>{_sseOpen=true;stopPolling();});
  _events.addEventListener("change",()=>refreshLive());
  _events.onerror=()=>{_sseOpen=false;startPolling();};
}
window.addEventListener("beforeunload",()=>{if(_events)_events.close();stopPolling();clearTimeout(_deferT);});

if(IN_TG){
  document.body.classList.add("in-tg");
  TG.ready(); TG.expand();
  applyTgTheme();
  TG.onEvent("themeChanged", applyTgTheme);
  TG.BackButton.onClick(tgLeft);
  /* высота строго по вьюпорту Telegram — контент не залезает под шапку/клавиатуру */
  const setVH = ()=>{ $("phone").style.height = (TG.viewportStableHeight || window.innerHeight) + "px"; };
  TG.onEvent("viewportChanged", setVH);
  setVH();
  /* в Telegram моки не показываем: имя — только то, что ввели при регистрации */
  profile = {name:"", short:"", tg:"", orgs:[], deps:[], status:"—"};
  const u = TG.initDataUnsafe && TG.initDataUnsafe.user;
  if(u){
    if(u.username) profile.tg = "@"+u.username;
    profile.short = [u.first_name,u.last_name].filter(Boolean).join(" ");
    if(u.photo_url) profile.photo = u.photo_url;
  }
  resetTo("boot", {});
  bootApp();
} else {
  /* браузер: кликабельный прототип на моках, регламент — первый экран */
  try {
    const sv = savedTheme();
    if(sv) $("phone").classList.toggle("dark", sv==="dark");
    resetTo("rules", {});
  } catch(e) {
    console.error("Init error:", e);
    toast("Ошибка инициализации: " + e.message);
  }
}
